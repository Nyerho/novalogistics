<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Shipment - Nova Logistics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div id="page-loader" class="page-loader">
        <img src="css/pixverse_t2i_ori_b3b17f94-c710-4f68-aa2d-921520f1d6b5.webp" class="loader-logo" alt="Nova Logistics">
    </div>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="css/pixverse_t2i_ori_b3b17f94-c710-4f68-aa2d-921520f1d6b5.webp" class="brand-logo" alt="Nova Logistics">
                <span>Nova Logistics</span>
            </a>
            <div class="d-flex">
                <a href="index.html" class="btn btn-outline-secondary btn-sm">Home</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="request-hero">
                        <div class="request-hero-overlay">
                            <h4 class="mb-1 fw-bold">Request a Shipment</h4>
                            <div class="small opacity-75">Worldwide pickup and delivery with tracking</div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="success-alert" class="alert alert-success d-none">
                            <h4 class="alert-heading">Request Successful!</h4>
                            <p>Your tracking code is: <strong id="new-tracking-code" class="fs-4"></strong></p>
                            <hr>
                            <p class="mb-0">Please save this code to track your package. Nova Logistics will review your request shortly.</p>
                        </div>

                        <form id="request-form">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Sender Name</label>
                                    <input type="text" id="req-sender" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Receiver Name</label>
                                    <input type="text" id="req-receiver" class="form-control" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Pickup Location (Origin)</label>
                                    <input type="text" id="req-origin" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Destination</label>
                                    <input type="text" id="req-dest" class="form-control" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Package Description</label>
                                    <input type="text" id="req-desc" class="form-control" placeholder="e.g. Laptop" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Estimated Weight</label>
                                    <input type="text" id="req-weight" class="form-control" placeholder="e.g. 2kg" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success btn-lg w-100">Submit Request</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('request-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const data = {
                sender: document.getElementById('req-sender').value,
                receiver: document.getElementById('req-receiver').value,
                origin: document.getElementById('req-origin').value,
                destination: document.getElementById('req-dest').value,
                description: document.getElementById('req-desc').value,
                weight: document.getElementById('req-weight').value,
                cost: 0 // Admin will set cost
            };

            const shipment = ShipmentManager.createShipment(data);
            
            document.getElementById('request-form').classList.add('d-none');
            document.getElementById('new-tracking-code').innerText = shipment.trackingId;
            document.getElementById('success-alert').classList.remove('d-none');
        });

        window.addEventListener('load', () => {
            const loader = document.getElementById('page-loader');
            if (!loader) return;
            loader.classList.add('is-hidden');
            window.setTimeout(() => loader.remove(), 300);
        });
    </script>
</body>
</html>
